<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>طلباتي - CA1 STORE</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="checkout-page">

<header>

    <!-- زر القائمة الجانبية -->
    <div class="side-menu-btn" id="sideMenuBtn">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="#fff">
            <path d="M3 6h18v2H3zm0 5h18v2H3zm0 5h18v2H3z"/>
        </svg>
    </div>

    <!-- القائمة الوسطية -->
    <nav class="menu-container">
        <ul class="menu">
            <li class="dropdown">
                <a class="drop-btn">القائمة</a>
                <ul class="dropdown-content">
                    <li><a href="index.html">الصفحة الرئيسية</a></li>
                    <li><a href="products.html?cat=fivem">منتجات الفايف إم</a></li>
                    <li><a href="products.html?cat=discord">منتجات الديسكورد</a></li>
                </ul>
            </li>
        </ul>
    </nav>

    <!-- الملف الشخصي -->
    <div class="profile-icon" id="profileIcon">
        <svg width="18" height="18" viewBox="0 0 24 24">
            <path fill="white" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4Zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4Z"/>
        </svg>
    </div>

    <!-- القائمة المنسدلة -->
    <div class="profile-dropdown" id="profileDropdown">
        <button onclick="window.location.href='profile.html'">حسابي</button>
        <button onclick="window.location.href='orders.html'">طلباتي</button>
        <button onclick="window.location.href='settings.html'">الإعدادات</button>
        <button onclick="logout()">تسجيل الخروج</button>
    </div>

</header>

<!-- القائمة الجانبية -->
<div id="sideMenu" class="side-menu">
    <a href="index.html">الصفحة الرئيسية</a>
    <a href="products.html?cat=fivem">منتجات فايف إم</a>
    <a href="products.html?cat=discord">منتجات الديسكورد</a>
    <a href="terms.html">الشروط والأحكام</a>
    <a href="YOUR_DISCORD_LINK">سيرفر الديسكورد</a>
</div>

<!-- زر الرجوع -->
<div class="back-btn-cart" onclick="history.back()">
    ⟵ Back
</div>

<section class="account-page">

    <div class="checkout-full" style="padding:35px; max-width:650px; margin:auto;">

        <h2 style="text-align:center; margin-bottom:25px;">طلباتي</h2>

        <div id="ordersList"></div>

    </div>

</section>

<script src="script.js"></script>

<script>
/* ============================================================
   حماية تسجيل الدخول
============================================================ */
const user = JSON.parse(localStorage.getItem("loggedUser") || "null");
if (!user) window.location.href = "account.html";

/* ============================================================
   عرض الطلبات
============================================================ */
const orders = user.orders || [];
const box = document.getElementById("ordersList");

if (orders.length === 0) {
    box.innerHTML = `
        <div class="orders-empty-box">
            <h2>لا توجد طلبات</h2>
            <p>لم تقم بأي عملية شراء حتى الآن.</p>
        </div>
    `;
} else {
    orders.slice().reverse().forEach((order, index) => {

        const div = document.createElement("div");
        div.className = "order-card";

        div.innerHTML = `
            <h3 class="order-title">طلب #${orders.length - index}</h3>

            <p><strong>رقم الطلب:</strong> ${order.id}</p>
            <p><strong>التاريخ:</strong> ${order.date}</p>
            <p><strong>الإجمالي:</strong> ${order.total} ر.س</p>

            <p style="margin-top:15px;"><strong>المنتج:</strong> ${order.product}</p>

            <!-- عرض الكود -->
            <div class="order-code-box" style="
                background:#f7f7f7;
                padding:12px;
                border-radius:8px;
                margin-top:12px;
                border:1px solid #ddd;
            ">
                <p><strong>الكود:</strong> <span>${order.key}</span></p>

                <p>
                    <strong>الحالة:</strong>
                    <span style="color:${order.used ? 'red' : 'green'};">
                        ${order.used ? 'مستخدم' : 'غير مستخدم'}
                    </span>
                </p>

                <button onclick="copyCode('${order.key}')" class="login-submit" style="margin-top:8px;">
                    نسخ الكود
                </button>
            </div>
        `;

        box.appendChild(div);
    });
}

/* ============================================================
   نسخ الكود
============================================================ */
function copyCode(code) {
    navigator.clipboard.writeText(code).then(() => {
        alert("تم نسخ الكود بنجاح");
    });
}

/* ============================================================
   تسجيل الخروج
============================================================ */
function logout() {
    localStorage.removeItem("loggedUser");
    window.location.href = "account.html";
}
</script>

</body>
</html>
