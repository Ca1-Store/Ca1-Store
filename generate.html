<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>صفحة توليد الأكواد</title>
    <style>
        body { font-family: Arial; background: #111; color: #fff; padding: 30px; text-align: center; }
        .box { background: #222; padding: 20px; border-radius: 10px; width: 350px; margin: auto; }
        input, select, button { width: 100%; padding: 10px; margin-top: 10px; }
        #generator { display: none; }
    </style>
</head>
<body>

<div id="login" class="box">
    <h2>تسجيل الدخول</h2>
    <input type="password" id="password" placeholder="أدخل كلمة السر">
    <button onclick="checkPassword()">دخول</button>
    <p id="error" style="color:red;"></p>
</div>

<div id="generator" class="box">
    <h2>توليد كود جديد</h2>

    <label>اختر النسخة:</label>
    <select id="product">
        <option value="Ca-1-Pack">Ca-1-Pack</option>
        <option value="Ca-2-Pack">Ca-2-Pack</option>
        <option value="Ca-3-Pack">Ca-3-Pack</option>
    </select>

    <button onclick="generate()">توليد الكود</button>

    <h3 id="result"></h3>
</div>

<script>
const PASSWORD = "CA-Admin";

function checkPassword() {
    const input = document.getElementById("password").value;
    if (input === PASSWORD) {
        document.getElementById("login").style.display = "none";
        document.getElementById("generator").style.display = "block";
    } else {
        document.getElementById("error").innerText = "كلمة السر غير صحيحة";
    }
}

function generateCode() {
    const random = Math.floor(1000000 + Math.random() * 9000000);
    return "CA-" + random;
}

async function generate() {
    const product = document.getElementById("product").value;
    const key = generateCode();

    const response = await fetch("/api/generateKey", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ key, product })
    });

    const data = await response.json();

    if (data.success) {
        document.getElementById("result").innerHTML =
            "✔ تم إنشاء الكود:<br><br><b>" + data.key + "</b>";
    } else {
        document.getElementById("result").innerHTML = "❌ حدث خطأ أثناء الحفظ";
    }
}
</script>

</body>
</html>
