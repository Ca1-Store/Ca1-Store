<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تم الدفع بنجاح - CA1 STORE</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="checkout-page">

<div class="stars"></div>

<section class="account-page">
    <div class="checkout-full" style="text-align:center; padding:40px;">

        <!-- أيقونة نجاح -->
        <div style="
            width:90px;
            height:90px;
            margin:0 auto 20px;
            border-radius:50%;
            background:linear-gradient(135deg,#00c853,#009624);
            display:flex;
            align-items:center;
            justify-content:center;
            box-shadow:0 0 20px rgba(0,255,120,0.4);
        ">
            <svg width="55" height="55" viewBox="0 0 24 24">
                <path fill="white" d="M9 16.17 4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
            </svg>
        </div>

        <h2 style="font-size:26px; margin-bottom:10px;">تم الدفع بنجاح </h2>

        <p style="opacity:0.85; font-size:16px; margin-bottom:25px;">
            شكرًا لك! تم استلام طلبك بنجاح.  
            فيما يلي تفاصيل فاتورتك.
        </p>

        <!-- صندوق الفاتورة -->
        <div id="invoiceBox" style="
            background:#fff;
            padding:20px;
            border-radius:10px;
            width:90%;
            max-width:450px;
            margin:0 auto 25px;
            text-align:right;
            box-shadow:0 0 15px rgba(0,0,0,0.15);
        ">
            <h3 style="margin-bottom:15px; text-align:center;">تفاصيل الفاتورة</h3>

            <p><strong>رقم الطلب:</strong> <span id="orderId"></span></p>
            <p><strong>المنتج:</strong> <span id="product"></span></p>
            <p><strong>السعر:</strong> <span id="price"></span> ر.س</p>
            <p><strong>الكمية:</strong> <span id="qty"></span></p>
            <p><strong>الإجمالي:</strong> <span id="total"></span> ر.س</p>
            <p><strong>البريد الإلكتروني:</strong> <span id="email"></span></p>
            <p><strong>رقم عملية PayPal:</strong> <span id="transactionId"></span></p>
        </div>

        <!-- زر عرض الطلبات -->
        <button class="login-submit" onclick="window.location.href='orders.html'">
            عرض طلباتي
        </button>

        <!-- زر العودة -->
        <button class="login-submit" style="margin-top:10px;" onclick="window.location.href='index.html'">
            العودة للرئيسية
        </button>

    </div>
</section>

<script>
    /* ============================================================
       حماية الصفحة
    ============================================================ */
    const user = JSON.parse(localStorage.getItem("loggedUser") || "null");
    if (!user) {
        window.location.href = "account.html";
    }

    /* ============================================================
       جلب الفاتورة من payment.js
    ============================================================ */
    const invoice = JSON.parse(localStorage.getItem("invoice"));

    if (!invoice) {
        document.getElementById("invoiceBox").innerHTML =
            "<p style='text-align:center;'>لا توجد فاتورة لعرضها.</p>";
    } else {
        document.getElementById("orderId").textContent = invoice.orderId;
        document.getElementById("product").textContent = invoice.product;
        document.getElementById("price").textContent = invoice.price;
        document.getElementById("qty").textContent = invoice.qty;
        document.getElementById("total").textContent = invoice.total;
        document.getElementById("email").textContent = invoice.email;
        document.getElementById("transactionId").textContent = invoice.transactionId;
    }

    /* ============================================================
       إضافة الطلب لحساب المستخدم
    ============================================================ */
    if (invoice) {
        let users = JSON.parse(localStorage.getItem("users") || "[]");
        let current = users.find(u => u.email === user.email);

        if (current) {
            if (!current.orders) current.orders = [];

            current.orders.push({
                id: invoice.orderId,
                date: new Date().toLocaleString(),
                items: [{
                    title: invoice.product,
                    price: invoice.price,
                    qty: invoice.qty
                }],
                total: invoice.total
            });

            // تحديث users[]
            localStorage.setItem("users", JSON.stringify(users));

            // تحديث loggedUser
            localStorage.setItem("loggedUser", JSON.stringify(current));
        }
    }

    /* ============================================================
       تنظيف بيانات الفاتورة والسلة
    ============================================================ */
    localStorage.removeItem("invoice");
    localStorage.removeItem("cart");
</script>
<script>
    // منع الرجوع للصفحات السابقة بعد الدفع
    history.pushState(null, "", location.href);
    window.onpopstate = function () {
        window.location.href = "index.html";
    };
</script>

</body>
</html>
