<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جميع المنتجات - CA1 Store</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="stars"></div>

<header>

    <nav>
        <ul class="menu">
           <li>
    <a href="index.html" class="home-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
    </a>
</li>


            <!-- روابط الأقسام -->
        </ul>
    </nav>

    <!-- السلة -->
    <div class="cart-icon" id="cartBtn">
        <span class="cart-count" id="cartCount">0</span>
        <svg width="18" height="18" viewBox="0 0 24 24">
            <path d="M7 18c-1.1 0-1.99.9..."/>
        </svg>
    </div>

</header>

<section class="products-page">

    <!-- الفلتر الجانبي -->
    <aside class="sidebar">
        <h3>تصفية المنتجات</h3>

        <div class="filter-group">
            <label>الفئة</label>
            <select id="categoryFilter">
                <option value="all">الكل</option>
                <option value="fivem">فايف إم</option>
                <option value="discord">ديسكورد</option>
                <option value="soon">قريبًا</option>
            </select>
        </div>

    </aside>

    <!-- شبكة المنتجات -->
    <div class="products-grid" id="productsGrid"></div>

</section>

<!-- الإشعار -->
<div id="niceAlert" class="nice-alert">تمت إضافة المنتج للسلة</div>

<script src="script.js"></script>

<script>

/* ============================
   قراءة القسم من الرابط
============================ */

const params = new URLSearchParams(window.location.search);
const category = params.get("cat") || "all";

const grid = document.getElementById("productsGrid");

/* ============================
   عرض المنتجات حسب القسم
============================ */

let filtered = productsData;

// لو الرابط يطلب قسم معيّن
if (category !== "all") {
    filtered = productsData.filter(p => p.category === category);
}

// إنشاء البطاقات
filtered.forEach(p => {
    const card = createProductCard(p);
    grid.appendChild(card);
});

// تفعيل زر الإضافة للسلة
activateAddToCartButtons();

/* ============================
   فلتر جانبي إضافي
============================ */

const categoryFilter = document.getElementById("categoryFilter");

categoryFilter.addEventListener("change", () => {
    const value = categoryFilter.value;

    document.querySelectorAll(".product-card").forEach(card => {
        const cat = card.dataset.category;

        if (value === "all" || value === cat) {
            card.style.display = "block";
        } else {
            card.style.display = "none";
        }
    });
});

</script>

</body>
</html>
