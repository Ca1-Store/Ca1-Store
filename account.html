<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - CA1 STORE</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="dark-login">

    <!-- زر الرجوع -->
    <div class="back-btn-fixed" onclick="history.back()">
        ⟵ Back
    </div>

    <!-- خلفية الإغلاق -->
    <div class="overlay-exit" onclick="closeLogin()"></div>

    <!-- Toast -->
    <div id="verifyToast" class="verify-toast"></div>

    <!-- صندوق تسجيل الدخول -->
    <div id="authBox" class="auth-box">

        <div class="auth-icon">
            <svg viewBox="0 0 24 24">
                <path fill="white" d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"/>
            </svg>
        </div>

        <div class="auth-title">تسجيل الدخول</div>

        <!-- الخطوة 1 -->
        <div id="emailStep">
            <input type="email" id="emailInput" class="auth-input" placeholder="البريد الإلكتروني">
            <button class="auth-btn" onclick="sendCode()">إرسال رمز التحقق</button>
        </div>

        <!-- الخطوة 2 -->
        <div id="codeStep" style="display:none;">
            <input type="text" id="codeInput" class="auth-input" placeholder="رمز التحقق">
            <button class="auth-btn" onclick="verifyLogin()">تأكيد الدخول</button>

            <button id="resendBtn" class="auth-btn" disabled onclick="resendCode()">
                إعادة الإرسال بعد 60s
            </button>
        </div>

    </div>

    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script src="Email.JS"></script>

    <script>
        /* حماية: منع دخول الصفحة إذا المستخدم مسجّل دخول */
        const user = JSON.parse(localStorage.getItem("loggedUser") || "null");
        if (user) window.location.href = "profile.html";

        /* حماية إضافية */
        let emailSent = false;

        function showToast(msg) {
            const t = document.getElementById("verifyToast");
            t.textContent = msg;
            t.classList.add("show");
            setTimeout(() => t.classList.remove("show"), 2000);
        }

        /* حماية: منع إدخال بريد غير صالح */
        function validateEmail() {
            const email = document.getElementById("emailInput").value.trim();
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        /* حماية: منع إدخال رمز غير رقمي */
        function validateCode() {
            const code = document.getElementById("codeInput").value.trim();
            return /^\d+$/.test(code);
        }

        /* دوال EmailJS من ملف email.js */
        function sendCode() {
            if (!validateEmail()) {
                showToast("الرجاء إدخال بريد إلكتروني صالح");
                return;
            }

            emailSent = true;
            sendCodeEmailJS();
        }

        function resendCode() {
            if (!emailSent) {
                showToast("الرجاء إدخال البريد أولاً");
                return;
            }

            if (document.getElementById("resendBtn").disabled) {
                showToast("انتظر حتى ينتهي العداد");
                return;
            }

            resendCodeEmailJS();
        }

        function verifyLogin() {
            if (!emailSent) {
                showToast("الرجاء إدخال البريد أولاً");
                return;
            }

            if (document.getElementById("codeStep").style.display === "none") {
                showToast("لا يمكنك الوصول لهذه الخطوة الآن");
                return;
            }

            if (!validateCode()) {
                showToast("الرمز يجب أن يكون أرقام فقط");
                return;
            }

            verifyLoginEmailJS();
        }

        function closeLogin() {
            const box = document.getElementById("authBox");
            box.classList.add("hide");
            setTimeout(() => window.location.href = "index.html", 300);
        }
    </script>

</body>
</html>
