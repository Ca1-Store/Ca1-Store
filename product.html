<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المنتج</title>
    <link rel="stylesheet" href="styles.css">

    <style>
        .product-page-header nav,
        .product-page-header .menu {
            display: none !important;
        }

        .back-btn {
            font-size: 26px;
            cursor: pointer;
            color: white;
            padding: 10px 15px;
            display: inline-block;
        }

        header.product-page-header {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            height: 60px;
        }

        .paypal-box {
            margin-top: 25px;
        }

        .hidden {
            display: none !important;
        }

        .buy-now-btn {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: #ffb300;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
        }

        .buy-now-btn.disabled {
            background: #777;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

<div class="stars"></div>

<header class="product-page-header">
    <span class="back-btn" onclick="history.back()">⟵</span>
</header>

<section class="product-page">

    <div class="product-image-box">
        <img id="productImage" src="">
    </div>

    <div class="product-info-box">
        <h2 id="productTitle"></h2>
        <p id="productDesc"></p>

        <div class="product-price" id="productPrice"></div>

        <!-- زر شراء الآن -->
        <button id="buyNowBtn" class="buy-now-btn hidden">شراء الآن</button>

        <!-- رسالة للمنتجات غير المتاحة -->
        <p id="notAvailable" class="hidden" style="color:#aaa; margin-top:20px;">
            المنتج غير متاح للشراء
        </p>

    </div>

</section>

<script src="script.js"></script>
<script src="product.js"></script>

<script>
/* بعد تحميل بيانات المنتج من product.js */
setTimeout(() => {

    if (!product) return;

    const buyNowBtn = document.getElementById("buyNowBtn");
    const notAvailable = document.getElementById("notAvailable");

    buyNowBtn.classList.add("hidden");
    notAvailable.classList.add("hidden");

    // المنتج غير متاح
    if (product.status === "soon" || !product.paypal) {
        notAvailable.classList.remove("hidden");
        return;
    }

    // المنتج متاح
    buyNowBtn.classList.remove("hidden");

    buyNowBtn.onclick = () => {
        window.location.href = product.paypal;
    };

}, 200);
</script>

</body>
</html>
