<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سلة المشتريات - CA1 STORE</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="checkout-page">

<header>

    <!-- زر القائمة الجانبية -->
    <div class="side-menu-btn" id="sideMenuBtn">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="#fff">
            <path d="M3 6h18v2H3zm0 5h18v2H3zm0 5h18v2H3z"/>
        </svg>
    </div>

    <!-- القائمة الوسطية -->
    <nav class="menu-container">
        <ul class="menu">
            <li class="dropdown">
                <a class="drop-btn">القائمة</a>
                <ul class="dropdown-content">
                    <li><a href="index.html">الصفحة الرئيسية</a></li>
                    <li><a href="products.html?cat=fivem">منتجات الفايف إم</a></li>
                    <li><a href="products.html?cat=discord">منتجات الديسكورد</a></li>
                </ul>
            </li>
        </ul>
    </nav>

    <!-- الملف الشخصي -->
    <div class="profile-icon" id="profileIcon">
        <svg width="18" height="18" viewBox="0 0 24 24">
            <path fill="white" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4Zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4Z"/>
        </svg>
    </div>

    <!-- القائمة المنسدلة -->
    <div class="profile-dropdown" id="profileDropdown">
        <button onclick="window.location.href='profile.html'">حسابي</button>
        <button onclick="window.location.href='orders.html'">طلباتي</button>
        <button onclick="window.location.href='settings.html'">الإعدادات</button>
        <button onclick="logout()">تسجيل الخروج</button>
    </div>

</header>

<!-- القائمة الجانبية -->
<div id="sideMenu" class="side-menu">
    <a href="index.html">الصفحة الرئيسية</a>
    <a href="products.html?cat=fivem">منتجات فايف إم</a>
    <a href="products.html?cat=discord">منتجات الديسكورد</a>
    <a href="terms.html">الشروط والأحكام</a>
    <a href="YOUR_DISCORD_LINK">سيرفر الديسكورد</a>
</div>

<!-- زر الرجوع -->
<div class="back-btn-cart" onclick="goBackProperly()">
    ⟵ Back
</div>

<section class="products-page" style="margin-top:140px;">

    <div class="checkout-full">

        <h2>سلة المشتريات</h2>
        <p>هنا تظهر المنتجات التي أضفتها للسلة.</p>

        <div id="cartItems" style="margin-top:20px;"></div>

        <h3 style="margin-top:20px;">
            الإجمالي: <span id="cartTotal">0 ر.س</span>
        </h3>
        <p id="usdTotalText" style="color:#ccc; margin-top:5px; font-size:15px;"></p>

        <hr style="margin:25px 0; opacity:0.3;">

        <h2>إتمام الشراء</h2>

        <button class="login-submit" id="confirmOrderBtn">تأكيد الطلب</button>

    </div>

</section>

<div id="niceAlert" class="nice-alert">تمت إضافة المنتج للسلة</div>

<script src="script.js"></script>

<script>
/* ============================
   عرض محتوى السلة
============================ */

function renderCheckoutCart() {
    const cart = JSON.parse(localStorage.getItem("cart")) || [];
    const cartItems = document.getElementById("cartItems");
    const cartTotal = document.getElementById("cartTotal");
    const usdText = document.getElementById("usdTotalText");

    cartItems.innerHTML = "";
    let total = 0;

    if (cart.length === 0) {
        cartItems.innerHTML = "<p>السلة فارغة.</p>";
        cartTotal.textContent = "0 ر.س";
        usdText.textContent = "";
        return;
    }

    cart.forEach(item => {
        total += item.price * item.qty;

        const div = document.createElement("div");
        div.className = "cart-item";
        div.innerHTML = `
            <img src="${item.image}">
            <div class="cart-item-info">
                <div class="cart-item-title">${item.title}</div>
                <div class="cart-item-price">${item.price} ر.س × ${item.qty}</div>

                <div class="cart-item-actions">
                    <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
                    <span class="qty-value">${item.qty}</span>
                    <button class="qty-btn" onclick="changeQty(${item.id}, -1)">-</button>

                    <span class="remove-item" onclick="removeItem(${item.id})">حذف</span>
                </div>
            </div>
        `;
        cartItems.appendChild(div);
    });

    cartTotal.textContent = total.toFixed(2) + " ر.س";

    const usdRate = 0.27;
    const usdTotal = (total * usdRate).toFixed(2);

    usdText.textContent = `(≈ ${usdTotal} USD)`;
}

function changeQty(id, amount) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    const item = cart.find(p => p.id === id);

    if (!item) return;

    item.qty += amount;

    if (item.qty <= 0) {
        cart = cart.filter(p => p.id !== id);
    }

    localStorage.setItem("cart", JSON.stringify(cart));
    renderCheckoutCart();
}

function removeItem(id) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    cart = cart.filter(p => p.id !== id);
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCheckoutCart();
}

renderCheckoutCart();

/* زر تأكيد الطلب */
document.getElementById("confirmOrderBtn").addEventListener("click", () => {

    const cart = JSON.parse(localStorage.getItem("cart") || "[]");

    if (!cart.length) {
        alert("السلة فارغة");
        return;
    }

    window.location.href = "payment.html";
});

/* تسجيل الخروج */
function logout() {
    localStorage.removeItem("loggedUser");
    window.location.href = "account.html";
}
</script>
<script>
function goBackProperly() {
    const ref = document.referrer;

    // إذا المستخدم جاء من صفحة الدفع أو السلة
    if (ref.includes("payment") || ref.includes("checkout")) {
        window.location.href = "index.html"; // يرجع للصفحة الرئيسية
    } else {
        history.back(); // يرجع للصفحة اللي كان فيها فعلاً
    }
}
</script>

</body>
</html>
